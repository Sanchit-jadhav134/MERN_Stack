<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #000000;
            color: #7c7c7c;
        }

        #btn{
            margin-top: 45vh;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 300px;
            height: 60px;
            background-color: #7c7c7c;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 10px;
        }

        #btn:hover{
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #7c7c7c;
        }
        
        input{
            display: none;
        }

        
    </style>
    <title>Document</title>
</head>
<body>
    <div id="main">
        <input id="fileinp" type="file">
        <div id="btn">
            Select File
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
