<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Photo Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ececec;
    padding:30px;
}

h1{
    text-align:center;
    color:#ff7f50;
    margin-bottom:20px;
}

.search-box{
    text-align:center;
    margin-bottom:30px;
}

.search-box input{
    width:300px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.gallery{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    border-radius:10px;
}

.gallery img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:5px;
    transition:0.4s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.08);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

</style>
</head>
<body>

<h1>Interactive Photo Gallery</h1>

<div class="search-box">
    <input type="text" placeholder="Search">
</div>

<div class="gallery">

    <img src="https://picsum.photos/id/1015/300/200" alt="">
    <img src="https://picsum.photos/id/1016/300/200" alt="">
    <img src="https://picsum.photos/id/1018/300/200" alt="">
    <img src="https://picsum.photos/id/1020/300/200" alt="">

    <img src="https://picsum.photos/id/1024/300/200" alt="">
    <img src="https://picsum.photos/id/1025/300/200" alt="">
    <img src="https://picsum.photos/id/1035/300/200" alt="">
    <img src="https://picsum.photos/id/1039/300/200" alt="">

    <img src="https://picsum.photos/id/1040/300/200" alt="">
    <img src="https://picsum.photos/id/1041/300/200" alt="">
    <img src="https://picsum.photos/id/1042/300/200" alt="">
    <img src="https://picsum.photos/id/1043/300/200" alt="">

</div>

</body>
</html>
