<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <link rel="stylesheet" href="card_animation.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">

    <div class="image-box">

        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600&q=80" alt="Profile">

        <div class="online"></div>

    </div>

    <h2>Sophia Carter</h2>

    <p>Web Developer</p>

    <div class="stats">

        <div>
            <h3>100</h3>
            <span>Posts</span>
        </div>

        <div>
            <h3>940K</h3>
            <span>Followers</span>
        </div>

        <div>
            <h3>185</h3>
            <span>Following</span>
        </div>

    </div>

    <div class="buttons">

        <button class="follow">Follow</button>

        <button class="message">Message</button>

    </div>

</div>

</body>
</html>
